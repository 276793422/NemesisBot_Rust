<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>吊销管理 — NemesisBot</title>
<style>
  body { font-family: -apple-system, "Segoe UI", sans-serif; margin: 20px; max-width: 1200px; color: #222; }
  h1 { font-size: 20px; } h2 { font-size: 16px; margin-top: 24px; border-bottom: 1px solid #ddd; padding-bottom: 4px; }
  table { border-collapse: collapse; width: 100%; margin: 8px 0; }
  th, td { border: 1px solid #ddd; padding: 5px 8px; text-align: left; font-size: 13px; word-break: break-all; }
  th { background: #f5f5f5; }
  input, select, button { padding: 5px 8px; font-size: 13px; box-sizing: border-box; }
  input[type=text], input:not([type]) { min-width: 160px; }
  button { cursor: pointer; background: #2a7; color: #fff; border: 0; border-radius: 3px; padding: 6px 12px; }
  button:hover { background: #195; }
  button.sec { background: #888; } button.sec:hover { background: #666; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 6px 0; }
  .muted { color: #888; font-size: 12px; }
  .err { color: #c33; } .ok { color: #2a7; }
  #login { padding: 12px; background: #f9f9f9; border-radius: 4px; }
</style>
</head>
<body>
<h1>吊销管理（NemesisBot 签名验证服务端）</h1>

<div id="login">
  <div class="row">
    <input id="token" placeholder="admin token" style="min-width:240px">
    <button onclick="doLogin()">登录</button>
    <span id="loginStatus" class="muted"></span>
  </div>
</div>

<div id="panel" style="display:none">

  <h2>CRL（吊销列表） <button class="sec" onclick="loadCrl()">刷新</button></h2>
  <table id="crlTable"><tr><th>维度</th><th>值</th><th>吊销时间</th><th>原因</th></tr></table>
  <div class="row">
    <select id="rvDim">
      <option value="key_id">key_id（密钥指纹）</option>
      <option value="sig_hash">sig_hash（单签名）</option>
      <option value="file_hash">file_hash（文件）</option>
      <option value="publisher">publisher（发布者）</option>
    </select>
    <input id="rvValue" placeholder="值（hex 或字符串）" style="min-width:300px">
    <input id="rvReason" placeholder="原因（如 key_leak）">
    <button onclick="addRevoke()">吊销</button>
    <span id="rvMsg"></span>
  </div>

  <h2>受信任公钥 <button class="sec" onclick="loadTrusted()">刷新</button></h2>
  <table id="tkTable"><tr><th>key_fp（hex）</th><th>状态</th></tr></table>
  <div class="row">
    <input id="tkFp" placeholder="key_fp hex（64 字符）" style="min-width:420px">
    <select id="tkStatus"><option value="active">active</option><option value="revoked">revoked</option></select>
    <button onclick="addTrusted()">设置</button>
    <span id="tkMsg"></span>
  </div>

  <h2>审计日志 <button class="sec" onclick="loadAudit()">刷新</button></h2>
  <table id="auTable"><tr><th>时间</th><th>操作</th><th>操作者</th><th>维度</th><th>值</th><th>原因</th></tr></table>

</div>

<script>
let TOKEN = localStorage.getItem('revAdminToken') || '';
if (TOKEN) { document.getElementById('token').value = TOKEN; doLogin(); }

function doLogin() {
  TOKEN = document.getElementById('token').value.trim();
  if (!TOKEN) { document.getElementById('loginStatus').innerHTML = '<span class=err>请输入 token</span>'; return; }
  localStorage.setItem('revAdminToken', TOKEN);
  document.getElementById('loginStatus').innerHTML = '<span class=ok>已登录</span>';
  document.getElementById('panel').style.display = 'block';
  loadCrl(); loadTrusted(); loadAudit();
}

async function api(path, method, body) {
  const opt = { method, headers: { 'Authorization': 'Bearer ' + TOKEN } };
  if (body) { opt.headers['Content-Type'] = 'application/json'; opt.body = JSON.stringify(body); }
  const r = await fetch(path, opt);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  return r.json();
}

function fmtTime(t) { return t ? new Date(t * 1000).toLocaleString() : ''; }
function esc(s) { return String(s == null ? '' : s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }

async function loadCrl() {
  try {
    const signed = await api('/v1/crl', 'GET');
    const crl = signed.payload;
    let rows = crl.entries.map(e =>
      `<tr><td>${esc(e.dim)}</td><td>${esc(e.value)}</td><td>${fmtTime(e.revoked_at)}</td><td>${esc(e.reason)}</td></tr>`
    ).join('');
    if (!rows) rows = `<tr><td colspan=4 class=muted>空（无吊销）</td></tr>`;
    rows += `<tr><td colspan=4 class=muted>CRL version ${crl.version}，共 ${crl.entries.length} 条</td></tr>`;
    document.getElementById('crlTable').innerHTML = '<tr><th>维度</th><th>值</th><th>吊销时间</th><th>原因</th></tr>' + rows;
  } catch (e) { /* crl 公开但签名，失败忽略 */ }
}

async function addRevoke() {
  const dim = document.getElementById('rvDim').value;
  const value = document.getElementById('rvValue').value.trim();
  const reason = document.getElementById('rvReason').value.trim() || 'manual';
  if (!value) { document.getElementById('rvMsg').innerHTML = '<span class=err>请填值</span>'; return; }
  try {
    await api('/v1/admin/revoke', 'POST', { dim, value, reason });
    document.getElementById('rvMsg').innerHTML = '<span class=ok>已吊销</span>';
    document.getElementById('rvValue').value = '';
    loadCrl(); loadAudit();
  } catch (e) { document.getElementById('rvMsg').innerHTML = '<span class=err>失败：' + esc(e.message) + '</span>'; }
}

async function loadTrusted() {
  try {
    const signed = await api('/v1/trusted-keys', 'GET');
    const tkl = signed.payload;
    let rows = tkl.keys.map(k => `<tr><td>${esc(k.key_fp)}</td><td>${esc(k.status)}</td></tr>`).join('');
    if (!rows) rows = `<tr><td colspan=2 class=muted>空（不限制公钥——所有签名公钥都信任）</td></tr>`;
    rows += `<tr><td colspan=2 class=muted>version ${tkl.version}，共 ${tkl.keys.length} 条</td></tr>`;
    document.getElementById('tkTable').innerHTML = '<tr><th>key_fp（hex）</th><th>状态</th></tr>' + rows;
  } catch (e) {}
}

async function addTrusted() {
  const key_fp = document.getElementById('tkFp').value.trim();
  const status = document.getElementById('tkStatus').value;
  if (!key_fp) { document.getElementById('tkMsg').innerHTML = '<span class=err>请填 key_fp</span>'; return; }
  try {
    await api('/v1/admin/trusted-key', 'POST', { key_fp, status, not_after: null });
    document.getElementById('tkMsg').innerHTML = '<span class=ok>已设置</span>';
    document.getElementById('tkFp').value = '';
    loadTrusted(); loadAudit();
  } catch (e) { document.getElementById('tkMsg').innerHTML = '<span class=err>失败：' + esc(e.message) + '</span>'; }
}

async function loadAudit() {
  try {
    const list = await api('/v1/audit', 'GET');
    let rows = list.map(a =>
      `<tr><td>${fmtTime(a.timestamp)}</td><td>${esc(a.action)}</td><td>${esc(a.operator)}</td><td>${esc(a.dim)}</td><td>${esc(a.value)}</td><td>${esc(a.reason)}</td></tr>`
    ).join('');
    if (!rows) rows = `<tr><td colspan=6 class=muted>无记录</td></tr>`;
    document.getElementById('auTable').innerHTML = '<tr><th>时间</th><th>操作</th><th>操作者</th><th>维度</th><th>值</th><th>原因</th></tr>' + rows;
  } catch (e) {}
}
</script>
</body>
</html>
