<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>签名 — NemesisBot</title>
<style>
  body { font-family: -apple-system, "Segoe UI", sans-serif; margin: 24px; max-width: 720px; color: #222; }
  h1 { font-size: 22px; }
  input, button { padding: 7px 10px; font-size: 13px; box-sizing: border-box; }
  button { cursor: pointer; background: #2a7; color: #fff; border: 0; border-radius: 3px; }
  button:hover { background: #195; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin: 8px 0; }
  .muted { color: #888; font-size: 12px; } .err { color: #c33; } .ok { color: #2a7; }
  a { color: #2a7; }
</style>
</head>
<body>
<h1>📝 签名文件</h1>
<p class="muted">开发者页：用签发 token 上传文件，服务端签名后自动下载。 <a href="/admin">管理后台 →</a></p>
<div class="row">
  <input id="userToken" placeholder="签发 token（用户）" style="min-width:380px">
</div>
<div class="row">
  <input type="file" id="signFile">
  <input id="signPublisher" placeholder="publisher（可选）">
  <button onclick="doSign()">签发并下载</button>
</div>
<p id="signMsg" class="muted"></p>

<script>
async function doSign() {
  const token = document.getElementById('userToken').value.trim();
  const f = document.getElementById('signFile').files[0];
  const publisher = document.getElementById('signPublisher').value.trim();
  const msg = document.getElementById('signMsg');
  if (!token) { msg.className='err'; msg.textContent='请输入签发 token'; return; }
  if (!f) { msg.className='err'; msg.textContent='请选择文件'; return; }
  msg.className='muted'; msg.textContent='签发中...';
  try {
    const fd = new FormData(); fd.append('file', f);
    if (publisher) fd.append('publisher', publisher);
    const r = await fetch('/v1/sign', { method:'POST', headers:{'Authorization':'Bearer '+token}, body:fd });
    if (!r.ok) { msg.className='err'; msg.textContent='签发失败: HTTP '+r.status+' '+(await r.text()).slice(0,120); return; }
    const blob = await r.blob();
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = f.name + '.signed';
    document.body.appendChild(a); a.click(); a.remove();
    msg.className='ok'; msg.textContent='✅ 签发成功，已下载 ' + a.download;
  } catch(e) { msg.className='err'; msg.textContent='失败: '+e.message; }
}
</script>
</body>
</html>
