# ── Subsystems (Class A leaves; on by default = current full build) ─────────

[[feature]]
id = "migrate"
label = "OpenClaw 迁移"
desc = "从 OpenClaw 导入配置/工作空间（`nemesisbot migrate`）"
category = "subsystems"
default = true

[[feature]]
id = "devices"
label = "设备管理"
desc = "USB 热插拔等设备监控（config: devices.enabled）"
category = "subsystems"
default = true

[[feature]]
id = "desktop"
label = "桌面集成"
desc = "系统托盘 + 审批弹窗 + 子进程窗口（plugin-ui）。IoT/无头建议关闭"
category = "subsystems"
default = true

[[feature]]
id = "health"
label = "健康检查服务"
desc = "/health 端点 + 就绪探针"
category = "subsystems"
default = true

[[feature]]
id = "heartbeat"
label = "心跳服务"
desc = "周期性自主心跳（HEARTBEAT.md 驱动 LLM）"
category = "subsystems"
default = true

[[feature]]
id = "auth"
label = "OAuth 认证"
desc = "`nemesisbot auth` 命令 + status 显示凭证（OAuth/PKCE）"
category = "subsystems"
default = true

[[feature]]
id = "voice"
label = "语音管线"
desc = "本地 STT/TTS/VAD（`nemesisbot voice` 命令 + Web 语音端点）"
category = "subsystems"
default = true

# NOTE: `cluster` 现已可裁剪（feature 穿透 nemesisbot → nemesis-web/cluster）。
# 关闭后 nemesis-cluster 整包不参与编译；集群 Dashboard 的 WSAPI 命令与 `cluster_rpc`
# 工具随之不可用。默认开启（=完整构建行为不变）。

[[feature]]
id = "cluster"
label = "集群（RPC/发现/续行）"
desc = "P2P 集群编排（`nemesisbot cluster` + 集群 Dashboard + cluster_rpc 工具）。单机/IoT 建议关闭"
category = "subsystems"
default = true

# ── Build profile (cargo profile, not a feature) ───────────────────────────

[[feature]]
id = "build-profile"
label = "构建 profile"
desc = "release（默认，带 unwind）/ iotsmall（最小体积，panic=abort）"
category = "build"
type = "enum"
default = "release"
options = ["release", "iotsmall"]
