# NemesisBot feature manifest. Hand-curated or generated by `nemesis-config init`.
# Single source of truth for the build configurator.
#
# Each `id` MUST match a real `[features]` entry in nemesisbot/Cargo.toml
# (run `nemesis-config check` to verify). The `build-profile` entry is special
# (it selects a cargo profile, not a feature).

# ── Channels (forwarded to nemesis-channels) ────────────────────────────────

[[feature]]
id = "channels-web"
label = "Web 通道"
desc = "内置 Web 仪表盘 + HTTP/SSE，浏览器访问"
category = "channels"
default = true

[[feature]]
id = "channels-webhook"
label = "Webhook 入站通道"
desc = "接收外部 Webhook 推送"
category = "channels"
default = true

