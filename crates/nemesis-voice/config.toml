# NewSaySomething config
# 模型下载地址支持 HuggingFace 镜像（hf-mirror.com）或 ModelScope

[stt]
model_name = "sensevoice-small"
language = "auto"

# ── 语言补救 lang_remedy ──────────────────────────────────────────
# 解决什么问题：某些多语种模型在 language="auto" 下会误判语言。
#   典型 = SenseVoice-Small（zh/en/ja/ko/yue）会把说出的英文识别成日语。
# 怎么补救：开启后，模型若声明了补救方式（见代码 lang_restriction::default_remedy_for_model），
#   当 auto 检测到的语言不在白名单时，用 fallback 语言把"同一句"再解一次。
#   SenseVoice 的声明 = 只允许 zh/en，否则强制英文重解（即"只识别中英文"）。
# 何时生效：仅 language="auto" 且模型声明了补救方式时；其余情况本开关无效。
# 默认值：false（缺省 / 删掉本行 / 旧配置无此字段 = 不补救 = 原始 auto 行为）。
#   本模板设 true → 新 onboarding 默认启用；已有 config.toml 需手动加这行才启用。
# 代价：启用时多挂一个识别器实例（约 +250MB 常驻内存），误判句多一次解码（约 75ms）。
# 怎么关：设 false，或删掉本行（= 默认 false）。
# 换模型：不在声明表里的模型（whisper / paraformer 等）→ 自动不补救，无需改代码。
# 详见 crates/nemesis-voice/src/lang_restriction.rs。
lang_remedy = true
use_itn = true
num_threads = 1

[vad]
model_name = "silero_vad"
threshold = 0.5
min_silence_duration = 0.3
min_speech_duration = 0.25
max_speech_duration = 30.0
window_size = 512

[tts]
# kokoro-multi-lang-v1_1（103 speakers）中英文都支持。关键：espeak-ng-data 必须带
# lang/ 语言定义文件（见 sources 里 espeak-ng-data/lang/gmw/en、lang/sit/cmn），
# 缺了英文会触发 lexicon Unknown token → C++ 崩。v1_0（53 speakers）同理也可用。
model_name = "kokoro-multi-lang-v1_1"
speaker_id = 45
speed = 1.0
num_threads = 4

[speaker]
model_name = "3dspeaker_speech_campplus_sv_zh_en_16k-common_advanced"
num_threads = 1

[audio]
capture_device = ""
playback_device = ""
target_sample_rate = 16000
gain = 3.0
energy_threshold = 0.015

[models]
dir = "./data"
auto_download = true

# ============================================================
# 代理配置
# 支持格式：
#   http://host:port     — HTTP/HTTPS 代理
#   socks5://host:port   — SOCKS5 代理
# 留空表示不使用代理
# ============================================================
[models.proxy]
url = ""

# ============================================================
# 模型下载配置
# mirror: 下载源前缀，可切换 hf-mirror.com / modelscope / 原始 huggingface
# 每个模型定义 base_url（仓库地址）和 files（需要下载的文件列表）
# ============================================================

[models.mirror]
# 默认使用 hf-mirror.com（国内可访问的 HuggingFace 镜像）
base = "https://hf-mirror.com"

[[models.sources]]
name = "sensevoice-small"
category = "stt"
repo = "csukuangfj/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-2024-07-17"
files = [
    { local = "model.onnx", remote = "model.int8.onnx" },
    { local = "tokens.txt", remote = "tokens.txt" },
]

[[models.sources]]
name = "silero_vad"
category = "vad"
repo = ""   # Not on HuggingFace; uses direct URL below
files = [
    { local = "silero_vad.onnx", remote = "", url = "https://github.com/k2-fsa/sherpa-onnx/releases/download/asr-models/silero_vad.onnx" },
]

