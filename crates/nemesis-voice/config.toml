# NewSaySomething config
# 模型下载地址支持 HuggingFace 镜像（hf-mirror.com）或 ModelScope

[stt]
model_name = "sensevoice-small"
language = "auto"
use_itn = true
num_threads = 1

[vad]
model_name = "silero_vad"
threshold = 0.5
min_silence_duration = 0.3
min_speech_duration = 0.25
max_speech_duration = 30.0
window_size = 512

[tts]
model_name = "kokoro-multi-lang-v1_1"
speaker_id = 45
speed = 1.0
num_threads = 4

[audio]
capture_device = ""
playback_device = ""
target_sample_rate = 16000
gain = 3.0
energy_threshold = 0.015

[models]
dir = "./data"
auto_download = true

# ============================================================
# 代理配置
# 支持格式：
#   http://host:port     — HTTP/HTTPS 代理
#   socks5://host:port   — SOCKS5 代理
# 留空表示不使用代理
# ============================================================
[models.proxy]
url = ""

# ============================================================
# 模型下载配置
# mirror: 下载源前缀，可切换 hf-mirror.com / modelscope / 原始 huggingface
# 每个模型定义 base_url（仓库地址）和 files（需要下载的文件列表）
# ============================================================

[models.mirror]
# 默认使用 hf-mirror.com（国内可访问的 HuggingFace 镜像）
base = "https://hf-mirror.com"

[[models.sources]]
name = "sensevoice-small"
category = "stt"
repo = "csukuangfj/sherpa-onnx-sense-voice-zh-en-ja-ko-yue-2024-07-17"
files = [
    { local = "model.onnx", remote = "model.int8.onnx" },
    { local = "tokens.txt", remote = "tokens.txt" },
]

[[models.sources]]
name = "silero_vad"
category = "vad"
repo = ""   # Not on HuggingFace; uses direct URL below
files = [
    { local = "silero_vad.onnx", remote = "", url = "https://github.com/k2-fsa/sherpa-onnx/releases/download/asr-models/silero_vad.onnx" },
]

