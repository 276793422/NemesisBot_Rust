[package]
name = "nemesis-verify"
version.workspace = true
license.workspace = true
edition.workspace = true

# crate-type：lib（供 Rust 依赖）+ cdylib（产 nemesis_verify.dll / libnemesis_verify.so / .dylib，C ABI 导出 nv_*）。
[lib]
name = "nemesis_verify"
crate-type = ["lib", "cdylib"]

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
ed25519-dalek = { workspace = true }
anyhow = { workspace = true }
sha2 = { workspace = true }
rand = { workspace = true }
base64 = { workspace = true }
# P2a：DLL 联网查 CRL（数据模式，blocking 同步 HTTP + rustls，无 OpenSSL 依赖）
reqwest = { workspace = true }
