# plugin-onnx — ONNX embedding plugin configuration
#
# Three model tiers:
#   large  — high quality, large model
#   medium — balanced quality and size (default)
#   small  — lightweight, fast
#
# Change `active` to switch model tier. After the plugin downloads
# a model, the local path is written back to this file automatically.

[plugin]
name = "plugin-onnx"
version = "0.1.0"
active = "medium"

# ---- Large model ----
[models.large]
name = "bge-base-en-v1.5"
dimension = 768
model_url = "https://hf-mirror.com/BAAI/bge-base-en-v1.5/resolve/main/onnx/model.onnx"
model_size = 430000000
tokenizer_url = "https://hf-mirror.com/BAAI/bge-base-en-v1.5/resolve/main/tokenizer.json"
tokenizer_size = 700000
local_model_path = ""
local_tokenizer_path = ""

# ---- Medium model (default) ----
[models.medium]
name = "all-MiniLM-L6-v2"
dimension = 384
model_url = "https://hf-mirror.com/sentence-transformers/all-MiniLM-L6-v2/resolve/main/onnx/model.onnx"
model_size = 90405214
tokenizer_url = "https://hf-mirror.com/sentence-transformers/all-MiniLM-L6-v2/resolve/main/tokenizer.json"
tokenizer_size = 466247
local_model_path = ""
local_tokenizer_path = ""

# ---- Small model ----
[models.small]
name = "all-MiniLM-L4-v2"
dimension = 256
model_url = "https://hf-mirror.com/sentence-transformers/all-MiniLM-L4-v2/resolve/main/onnx/model.onnx"
model_size = 60000000
tokenizer_url = "https://hf-mirror.com/sentence-transformers/all-MiniLM-L4-v2/resolve/main/tokenizer.json"
tokenizer_size = 466000
local_model_path = ""
local_tokenizer_path = ""
