[package]
name = "nemesis-web"
version.workspace = true
edition.workspace = true

[dependencies]
nemesis-types = { workspace = true }
nemesis-bus = { workspace = true }
nemesis-providers = { workspace = true }
nemesis-config = { workspace = true }
nemesis-cluster = { workspace = true, optional = true }
nemesis-forge = { workspace = true, optional = true }
nemesis-skills = { workspace = true }
nemesis-security = { workspace = true, optional = true }
nemesis-cron = { workspace = true }
nemesis-services = { workspace = true }
nemesis-voice = { workspace = true, optional = true }
nemesis-memory = { workspace = true, optional = true }
nemesis-data = { workspace = true }
nemesis-agent = { workspace = true }
nemesis-workflow = { workspace = true, optional = true }
nemesis-utils = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
reqwest = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
chrono = { workspace = true }
axum = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
parking_lot = { workspace = true }
futures = { workspace = true }
async-stream = { workspace = true }
dashmap = { workspace = true }
http = "1"
url = "2"
async-trait = { workspace = true }
tokio-util = { version = "0.7", features = ["rt"] }
base64 = { workspace = true }
sha2 = { workspace = true }
hmac = { workspace = true }

[features]
# Optional subsystems (not in default — enabled via feature passthrough from
# the `nemesisbot` binary so a trimmed build can drop them).
voice = ["dep:nemesis-voice"]
cluster = ["dep:nemesis-cluster"]
forge = ["dep:nemesis-forge"]
memory = ["dep:nemesis-memory"]
workflow = ["dep:nemesis-workflow"]
security = ["dep:nemesis-security", "nemesis-security/security"]

[dev-dependencies]
tempfile = "3"
tokio-tungstenite = { workspace = true }
